<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Placement Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="/">🏠 Home</a>
        <a href="/students">👥 Students</a>
        <a href="/search">🔍 Search</a>
        <a href="/ranking">🏆 Ranking</a>
        <a href="/dashboard">📊 Dashboard</a>
    </nav>

    <!-- Main Container -->
    <div class="container">

        <h1>🚀 AI Placement Predictor</h1>

        <p class="subtitle">
            Analyze your skills and predict your placement readiness
        </p>

        <form action="/submit" method="POST">

            <label>👤 Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter your name"
                required>

            <label>🎓 CGPA</label>
            <input
                type="number"
                step="0.1"
                name="cgpa"
                placeholder="Enter your CGPA"
                required>

            <label>🐍 Python Skill (1-10)</label>
            <input
                type="number"
                name="python_skill"
                min="1"
                max="10"
                placeholder="Rate your Python skill"
                required>

            <label>📚 DSA Skill (1-10)</label>
            <input
                type="number"
                name="dsa_skill"
                min="1"
                max="10"
                placeholder="Rate your DSA skill"
                required>

            <label>🚀 Projects Count</label>
            <input
                type="number"
                name="projects"
                placeholder="Number of projects completed"
                required>

            <input
                type="submit"
                value="Predict Placement Chance">

        </form>

        <footer>
            Developed by Lavanya K | B.Tech AIML 🚀
        </footer>

    </div>

</body>
</html>
